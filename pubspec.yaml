name: buildervet
description: A renovation platform for managing tasks, projects, and contractors.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Utilities
  intl: ^0.19.0

  # Material Design
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # Imaging & HTTP
  image_picker: ^1.2.1
  pro_image_editor: ^12.0.6
  http: ^1.6.0
  cached_network_image: ^3.3.1
  file_picker: ^10.3.10
  logger: ^2.6.2
  emoji_picker_flutter: ^4.4.0
  record: ^5.1.0
  audioplayers: ^6.0.0
  video_player: ^2.8.2
  chewie: ^1.7.5
  open_file_plus: ^3.4.1
  mime: ^1.0.4
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/mock_users.json
