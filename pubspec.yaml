name: buildervet
description: A renovation platform for managing tasks, projects, and contractors.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0

  # Navigation
  go_router: ^14.0.0

  # Utilities
  intl: ^0.19.0

  # Material Design
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

  # Imaging & HTTP
  image_picker: ^1.0.7
  pro_image_editor: ^12.0.6
  http: ^1.2.0
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/mock_users.json
